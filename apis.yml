apis:
  - name: Sendoso Sending Platform API
    description: >-
      The Sendoso API enables programmatic sending of gifts, swag, e-gifts, direct mail, and branded merchandise.
      Integrate gift-sending into CRM workflows, marketing automation, and customer engagement pipelines. Supports
      recipient management, inventory browsing, budget tracking, and send analytics.
