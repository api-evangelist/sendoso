name: Sendoso
description: >-
  Sendoso is a corporate gifting and direct mail platform that enables sales, marketing, and customer success teams to
  send physical and digital gifts at scale. The Sendoso Sending Platform provides personalized gift sending, branded
  swag, e-gift cards, direct mail, and charitable donations. Sendoso integrates with Salesforce, HubSpot, Outreach,
  Marketo, and other CRM and sales engagement tools to automate gift-sending at scale.
