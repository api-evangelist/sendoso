      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sendoso-sends.createsend
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-send
      description: Retrieve Send
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sendoso-sends.retrievesend
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-send
      description: Cancel Send
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sendoso-sends.cancelsend
      outputParameters:
      - type: object
        mapping: $.
